<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Function Table</title>
    <link rel="stylesheet" href="style.css?v=2" />
    <!-- <link rel="stylesheet" href="description.css" /> -->

</head>

<body>
    <div class="container">
        <div class="content" id="splitContainer">
            <div class="panel table-panel" id="tablePanel">
                <h4>Function Table</h4>

                <table id="funcTable"> <!-- Right panel -->
                    <thead>
                        <tr>
                            <th>Sr No.</th>
                            <th>ID</th>
                            <th>Function Name</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows will be added dynamically later -->
                    </tbody>
                </table>
                <input type="text" id="searchBar" onkeyup="searchFunction()" placeholder="Search function name...">
            </div>

            <div id="divider" class="divider"></div>

            <div id="descPanel" class="panel desc-panel"> <!-- Left panel -->
                <h4>Description</h4>
                <div id="descContent"></div>
            </div>
        </div>
    </div>
    <div class="toolbar">
        <button class="tool-btn">start</button>
        <button class="tool-btn">stop</button>
        <button class="tool-btn">resume</button>
    </div>

    <script src="script.js?v=2"></script>
</body>

</html>
